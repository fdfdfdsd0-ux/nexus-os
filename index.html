<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS v4.20 - Workspaces Edition</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://placehold.co/192x192/000000/3b82f6.png?text=N">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #000;
            --window-bg: rgba(30, 30, 30, 0.85);
            --window-header: rgba(40, 40, 40, 0.95);
            --text-main: #e5e7eb;
            --accent-color: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .terminal-font { font-family: 'JetBrains Mono', monospace; }
        #boot-screen, #login-screen, #update-screen, #setup-screen { z-index: 9999; }
        #publish-modal { z-index: 9000; }
        #calendar-widget, #quick-settings { z-index: 5000; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        /* Window animations */
        .window {
            transition: opacity 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(12px);
            min-width: 300px; min-height: 200px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .window.dragging { transition: none; }
        .window.opening { opacity: 0; transform: scale(0.9); }
        .window.open { opacity: 1; transform: scale(1); }
        .window.minimized { opacity: 0; transform: scale(0.7) translateY(100%); pointer-events: none; }
        .window.maximized { top: 0 !important; left: 0 !important; width: 100vw !important; height: calc(100vh - 48px) !important; border-radius: 0; transform: none !important; }
        .window.active-window { border-color: rgba(255,255,255,0.3); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .window:not(.active-window) .titlebar { opacity: 0.6; transition: opacity 0.2s; }
        /* Workspace hiding */
        .window.hidden-workspace { display: none !important; }

        .custom-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Resizers */
        .resizer { position: absolute; user-select: none; touch-action: none; }
        .resizer.right { cursor: ew-resize; height: 100%; right: 0; top: 0; width: 6px; z-index: 20; }
        .resizer.bottom { cursor: ns-resize; width: 100%; bottom: 0; left: 0; height: 6px; z-index: 20; }
        .resizer.corner { cursor: nwse-resize; right: 0; bottom: 0; width: 12px; height: 12px; z-index: 21; }

        .wallpaper {
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop'); 
            background-size: cover; background-position: center; transition: background-image 0.5s ease;
        }
        .task-item.active { background-color: rgba(255, 255, 255, 0.15); border-bottom: 2px solid var(--accent-color); }
        .task-item.hidden-workspace { opacity: 0.3; }
        
        #context-menu, #file-context-menu, #taskbar-context-menu, #icon-context-menu { transition: opacity 0.1s ease; }
        
        /* Notifications */
        #notification-area { pointer-events: none; }
        .notification { pointer-events: auto; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .notification.closing { animation: slideOut 0.3s ease-in forwards; }
        @keyframes slideIn { 0% { transform: translateX(120%) scale(0.9); opacity: 0; } 100% { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes slideOut { 0% { transform: translateX(0) scale(1); opacity: 1; } 100% { transform: translateX(120%) scale(0.9); opacity: 0; } }
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
    </style>
</head>
<body class="h-screen w-screen select-none wallpaper relative" oncontextmenu="return false;">

    <!-- Hidden Inputs -->
    <input type="file" id="app-uploader" accept=".html" class="hidden">
    <input type="file" id="wp-uploader" accept="image/*" class="hidden">

    <!-- Global Drag-and-Drop Overlay -->

    <!-- Quick Settings Panel -->

        <div class="space-y-5">
            <!-- Volume -->

                    <i data-lucide="volume-2" class="w-4 h-4 text-gray-400"></i>
                    <input type="range" id="qs-volume" class="flex-1 h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500" value="100" min="0" max="100">
                </div>
            </div>
            <!-- Theme Toggle -->
            <div class="flex items-center justify-between pt-2 border-t border-gray-800">
                <div class="flex items-center gap-2">
                    <i data-lucide="moon" class="w-4 h-4 text-gray-400" id="qs-theme-icon"></i>
                    <span class="text-sm text-gray-300 font-medium">Dark Mode</span>
                </div>
                <button id="qs-theme-toggle" class="w-10 h-5 bg-blue-600 rounded-full relative transition-colors shadow-inner" onclick="toggleDarkMode()">

            </div>
        </div>

    <!-- Media Widget -->
    <div id="media-widget" class="absolute bottom-14 right-4 w-72 bg-gray-900/95 backdrop-blur-xl border border-gray-700 rounded-lg shadow-2xl p-4 hidden opacity-0 transition-opacity duration-200 transform origin-bottom-right z-[5000]">
        <div class="flex gap-4 items-center">
            <div class="w-12 h-12 bg-gray-800 rounded-md flex items-center justify-center overflow-hidden shrink-0">
                <i data-lucide="music" class="w-6 h-6 text-indigo-400"></i>
            </div>

        </div>
        <div class="mt-4 flex items-center gap-2 text-xs text-gray-400">

            <input type="range" id="media-progress" class="flex-1 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" value="0" min="0" max="100">
            <span id="media-duration" class="w-8">0:00</span>
        </div>
        <div class="mt-4 flex justify-center items-center gap-6">
            <button class="text-gray-400 hover:text-white transition" onclick="mediaManager.prev()"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
            <button class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:bg-gray-200 transition" onclick="mediaManager.togglePlay()" id="media-play-btn"><i data-lucide="play" class="w-5 h-5 ml-1"></i></button>

        </div>
    </div>

    <!-- Calendar Widget -->
    <div id="calendar-widget" class="absolute bottom-14 right-4 w-72 bg-gray-900/95 backdrop-blur-xl border border-gray-700 rounded-lg shadow-2xl p-4 hidden opacity-0 transition-opacity duration-200 transform origin-bottom-right">

            <div class="text-sm text-gray-400" id="cal-year">Year</div>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-xs text-gray-500 mb-2">
            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        <div id="cal-days" class="grid grid-cols-7 gap-1 text-center text-sm text-gray-300"></div>
    </div>

    <!-- Publish Modal -->
    <div id="publish-modal" class="absolute inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center hidden opacity-0 transition-opacity duration-200">

                <div><label class="text-xs text-gray-400 uppercase font-bold">App Name</label><input type="text" id="pub-name" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white outline-none mt-1"></div>
                <div><label class="text-xs text-gray-400 uppercase font-bold">Description</label><textarea id="pub-desc" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white outline-none mt-1 h-20 resize-none"></textarea></div>
                <div><label class="text-xs text-gray-400 uppercase font-bold">Author</label><input type="text" id="pub-author" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white outline-none mt-1" value="User"></div>
            </div>
            <div class="flex gap-2 mt-6 justify-end">
                <button onclick="closePublishModal()" class="px-4 py-2 text-gray-300 hover:bg-white/10 rounded text-sm">Cancel</button>
                <button id="pub-confirm-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded text-sm font-bold">Publish</button>
            </div>
        </div>
    </div>

    <!-- Boot Screen -->
    <div id="boot-screen" class="absolute inset-0 bg-black flex flex-col justify-start p-10 terminal-font text-gray-300 text-sm overflow-hidden">
        <div id="boot-text"></div>
    </div>

    <!-- Update Screen -->
    <div id="update-screen" class="absolute inset-0 bg-black flex flex-col justify-center items-center terminal-font text-white hidden">
        <i data-lucide="refresh-cw" class="w-16 h-16 animate-spin text-blue-500 mb-6"></i>
        <h2 class="text-2xl font-bold mb-2">Updating Nexus OS to v4.20</h2>
        <p id="update-text" class="text-gray-400 text-sm">Initializing...</p>
        <div class="w-64 h-1 bg-gray-800 rounded mt-4 overflow-hidden"><div id="update-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div></div>
    </div>

    <!-- Firebase Auth Screen (Replaces old Setup & Login Screens) -->

            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>
            <div class="w-16 h-16 bg-black border border-gray-700 rounded-full flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                <i data-lucide="shield-alert" class="w-8 h-8 text-blue-500"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2 tracking-tight">Restricted System</h1>
            <p class="text-gray-400 text-sm mb-8 text-center px-4">Nexus OS is locked. Authorized personnel only.</p>

            <button onclick="window.handleGoogleLogin()" class="w-full bg-white hover:bg-gray-200 text-black font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-3 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 active:translate-y-0">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"> Sign in with Google
            </button>
            
            <div id="login-error-msg" class="w-full mt-6 p-4 bg-red-900/30 border border-red-900/50 rounded-lg text-red-400 text-sm text-center hidden"></div>
        </div>
    </div>

    <!-- Desktop Area -->
    <div class="absolute top-4 left-4 bottom-14 right-4" id="desktop-area">
        <div class="w-full h-full relative flex flex-col flex-wrap content-start gap-2 p-2" id="desktop-icons"></div>
    </div>

    <!-- Notification Area -->
    <div id="notification-area" class="absolute top-12 right-4 flex flex-col gap-3 z-[9990] w-80"></div>

    <!-- Main Context Menu -->
    <div id="context-menu" class="absolute bg-[#2d2d2d] border border-gray-700 rounded-lg shadow-2xl w-48 py-1 hidden z-[9999] text-sm">
        <button onclick="renderDesktop(); hideContextMenu()" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="refresh-cw" class="w-4 h-4 text-gray-400"></i> Refresh Desktop</button>
        <div class="h-px bg-gray-700 my-1"></div>
        <button onclick="window.createNewFolder(); hideContextMenu()" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="folder-plus" class="w-4 h-4 text-yellow-500"></i> New Folder</button>

        <div class="h-px bg-gray-700 my-1"></div>
        <button onclick="document.getElementById('app-uploader').click(); hideContextMenu()" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="download" class="w-4 h-4 text-green-400"></i> Install App (.html)</button>
        <button onclick="openApp('settings'); hideContextMenu()" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="image" class="w-4 h-4 text-blue-400"></i> Change Wallpaper</button>
        <div class="h-px bg-gray-700 my-1"></div>
        <button onclick="toggleFullScreen(); hideContextMenu()" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="maximize" class="w-4 h-4"></i> Toggle Fullscreen</button>
        <button onclick="lockSystem(); hideContextMenu()" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4 text-yellow-400"></i> Lock System</button>

        <button id="tcm-info" class="w-full text-left px-4 py-2 hover:bg-white/10 text-gray-200 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-blue-400"></i> App Info</button>

    </div>

    <!-- Window Area -->
    <div id="window-area" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

    <!-- Taskbar -->
    <div class="absolute bottom-0 w-full h-12 bg-gray-900/90 backdrop-blur-md border-t border-gray-700 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-2 flex-1">
            <button id="menu-btn" class="p-2 rounded hover:bg-white/10 transition-colors active:bg-white/20 mr-1"><i data-lucide="layout-grid" class="w-5 h-5 text-blue-400"></i></button>

            </button>

        <div class="p-4 border-b border-gray-700"><input type="text" id="menu-search" placeholder="Search apps..." class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-white placeholder-gray-500"></div>

        <div class="p-3 bg-gray-950/50 border-t border-gray-700 flex justify-between items-center rounded-b-lg mt-auto">
            <div class="flex items-center gap-2"><div id="menu-avatar" class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-xs">U</div><div class="text-xs"><div class="font-bold" id="menu-user">User</div><div class="text-gray-500">Local Account</div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }

        const TARGET_VERSION = "4.20"; 
        let installedVersion = localStorage.getItem('gemini_os_version') || "3.0";
        let userWallpaper = localStorage.getItem('gemini_os_wallpaper') || null;
        let userData = JSON.parse(localStorage.getItem('gemini_os_user_data'));
        let currentWorkspace = 1;
        
        let db = null; 
        let currentUser = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- Firebase Auth Setup ---
        const firebaseConfig = {
            apiKey: "AIzaSyBkVzoH_d_syl2iV7_1jDkQRXiKFJm7dbk",
            authDomain: "nexus-os-b53d9.firebaseapp.com",
            projectId: "nexus-os-b53d9",
            storageBucket: "nexus-os-b53d9.firebasestorage.app",
            messagingSenderId: "402314809201",
            appId: "1:402314809201:web:ad6cfbdd0e812b9583f0d0",
            measurementId: "G-HSB4YMRDV9"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // Strict Ban List
        const allowedEmails = [
            "bexlebeau30@students.cumberlandschools.org",
            "minmotyka30@students.cumberlandschools.org",
            "benjamin.lebeau731@gmail.com",
            "majcartier30@students.cumberlandschools.org",
            "gacthibeault30@students.cumberlandschools.org",
            "475347@students.cumberlandschools.org"
        ];
        let osBooted = false;

        window.handleGoogleLogin = async () => {
            const errorMsg = document.getElementById('login-error-msg');
            errorMsg.classList.add('hidden');
            try {
                await signInWithPopup(auth, provider);

        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            document.getElementById('drop-overlay').classList.add('hidden');
            
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                let successCount = 0;
                Array.from(e.dataTransfer.files).forEach(file => {
                    if (file.type.startsWith('audio/')) {
                        if (mediaManager) mediaManager.addTrack(file);
                        window.notify("Audio Redirected", `Added "${file.name}" to Nexus Music to save desktop space.`);
                        return;
                    }
                    if (file.size > 2.5 * 1024 * 1024) {
                        alert(`Cannot upload "${file.name}". The file is over 2.5MB and exceeds the browser's storage limit for the desktop. Please use dedicated apps for large media.`);
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const isImage = file.type.startsWith('image/');
                            const path = `/home/user/Desktop/${file.name}`;
                            if(!fs.getPath('/home/user/Desktop')) fs.createPath('/home/user/Desktop', 'dir');
                            
                            fs.createPath(path, 'file', ev.target.result);
                            const node = fs.getPath(path);
                            if (isImage && node) { node.img = ev.target.result; saveFS(); }
                            
                            successCount++;
                            if (successCount === e.dataTransfer.files.length) {
                                renderDesktop();
                                window.notify("Upload Complete", `Saved ${successCount} file(s) to Desktop.`);
                            }
                        } catch(err) {
                            alert(`Failed to save ${file.name}. LocalStorage might be full (Browsers limit sizes).`);
                        }
                    };
                    if(file.type.startsWith('text/') || file.name.endsWith('.html') || file.name.endsWith('.md')) {
                        reader.readAsText(file);
                    } else {
                        reader.readAsDataURL(file); // Base64 encoding for media/other files
                    }
                });
            }
        });

        const mediaManager = {
            audio: null,
            db: null,
            playlist: [
                { title: "Lofi Study", artist: "FASSounds", url: "https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3", cover: "https://placehold.co/150x150/1db954/121212.png?text=Lofi" },
                { title: "Chill Abstract", artist: "Coma-Media", url: "https://cdn.pixabay.com/download/audio/2022/11/03/audio_73e72648fb.mp3", cover: "https://placehold.co/150x150/8b5cf6/121212.png?text=Chill" },
                { title: "Good Night", artist: "FASSounds", url: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_517a61d155.mp3", cover: "https://placehold.co/150x150/3b82f6/121212.png?text=Night" }
            ],
            currentIndex: -1,
            initDB: () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open("NexusMusicDB", 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains("tracks")) {
                            db.createObjectStore("tracks", { keyPath: "id", autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => {
                        mediaManager.db = e.target.result;
                        resolve(e.target.result);
                    };
                    request.onerror = (e) => reject(e);
                });
            },
            loadSavedTracks: () => {
                if (!mediaManager.db) return;
                const transaction = mediaManager.db.transaction(["tracks"], "readonly");
                const store = transaction.objectStore("tracks");
                const request = store.getAll();
                request.onsuccess = () => {
                    const tracks = request.result;
                    tracks.forEach(t => {
                        try {
                            const url = URL.createObjectURL(t.file);
                            if (!mediaManager.playlist.some(p => p.title === t.title && p.artist === t.artist)) {
                                mediaManager.playlist.push({
                                    title: t.title,
                                    artist: t.artist,
                                    url: url,
                                    cover: t.cover
                                });
                            }
                        } catch(e) { console.warn("Failed to load a track from DB", e); }
                    });
                    if(window.refreshMusicAppUI) window.refreshMusicAppUI();
                };
            },
            init: async () => {
                mediaManager.audio = document.getElementById('system-audio');
                mediaManager.audio.addEventListener('timeupdate', mediaManager.updateProgress);
                mediaManager.audio.addEventListener('ended', mediaManager.next);
                mediaManager.audio.addEventListener('play', () => {
                    const btn = document.getElementById('media-play-btn');
                    btn.innerHTML = '<i data-lucide="pause" class="w-5 h-5"></i>';
                    lucide.createIcons({root: btn});
                    document.getElementById('media-taskbar-btn').classList.remove('hidden');
                    
                    const appBtn = document.getElementById('app-media-play');
                    if(appBtn) { appBtn.innerHTML = '<i data-lucide="pause" class="w-4 h-4 fill-current"></i>'; lucide.createIcons({root: appBtn}); }
                    if(window.updateMusicAppHighlight) window.updateMusicAppHighlight();

                    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
                });
                mediaManager.audio.addEventListener('pause', () => {
                    const btn = document.getElementById('media-play-btn');
                    btn.innerHTML = '<i data-lucide="play" class="w-5 h-5 ml-1"></i>';
                    lucide.createIcons({root: btn});

                    const appBtn = document.getElementById('app-media-play');
                    if(appBtn) { appBtn.innerHTML = '<i data-lucide="play" class="w-4 h-4 ml-1 fill-current"></i>'; lucide.createIcons({root: appBtn}); }

                    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
                });
                document.getElementById('media-progress').addEventListener('input', (e) => {
                    if(mediaManager.audio.duration) mediaManager.audio.currentTime = (e.target.value / 100) * mediaManager.audio.duration;
                });

                if ('mediaSession' in navigator) {
                    navigator.mediaSession.setActionHandler('play', () => mediaManager.audio.play());
                    navigator.mediaSession.setActionHandler('pause', () => mediaManager.audio.pause());
                    navigator.mediaSession.setActionHandler('previoustrack', () => mediaManager.prev());
                    navigator.mediaSession.setActionHandler('nexttrack', () => mediaManager.next());
                    navigator.mediaSession.setActionHandler('seekbackward', (details) => {
                        mediaManager.audio.currentTime = Math.max(mediaManager.audio.currentTime - (details.seekOffset || 10), 0);
                    });
                    navigator.mediaSession.setActionHandler('seekforward', (details) => {
                        mediaManager.audio.currentTime = Math.min(mediaManager.audio.currentTime + (details.seekOffset || 10), mediaManager.audio.duration);
                    });
                    navigator.mediaSession.setActionHandler('seekto', (details) => {
                        mediaManager.audio.currentTime = details.seekTime;
                    });
                }
                
                try {
                    await mediaManager.initDB();
                    mediaManager.loadSavedTracks();
                } catch(e) { console.warn("Failed to init music DB", e); }
            },
            addTrack: (file, silent = false) => {
                const title = file.name.replace(/\.[^/.]+$/, "");
                const artist = "Local Device";
                const cover = "https://placehold.co/150x150/1f2937/ffffff.png?text=Local";
                const url = URL.createObjectURL(file);
                
                mediaManager.playlist.push({
                    title: title,
                    artist: artist,
                    url: url,
                    cover: cover
                });
                
                if(window.refreshMusicAppUI) window.refreshMusicAppUI();
                if(!silent) window.notify("Music Uploaded", `Added ${file.name} to Library`, 2000);
                
                if (mediaManager.db) {
                    try {
                        const transaction = mediaManager.db.transaction(["tracks"], "readwrite");
                        const store = transaction.objectStore("tracks");
                        const blob = new Blob([file], { type: file.type || 'audio/mpeg' });
                        store.add({ file: blob, title, artist, cover });
                    } catch(e) { console.warn("Could not save track to DB", e); }
                }
            },
            playTrack: (index) => {
                if (index < 0 || index >= mediaManager.playlist.length) return;
                mediaManager.currentIndex = index;
                const track = mediaManager.playlist[index];
                mediaManager.audio.src = track.url;
                mediaManager.audio.play();
                document.getElementById('media-title').innerText = track.title;
                document.getElementById('media-artist').innerText = track.artist;
                document.getElementById('media-taskbar-btn').classList.remove('hidden');

                const appTitle = document.getElementById('app-media-title');
                if(appTitle) {
                    appTitle.innerText = track.title;
                    document.getElementById('app-media-artist').innerText = track.artist;
                    const img = document.getElementById('app-media-cover');
                    if(img && track.cover) img.src = track.cover;
                }

                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: track.title,
                        artist: track.artist,
                        album: 'Nexus OS',
                        artwork: [
                            { src: track.cover || 'https://placehold.co/512x512/1f2937/818cf8.png?text=Music', sizes: '512x512', type: 'image/png' }
                        ]
                    });
                }
            },
            togglePlay: () => {
                if(mediaManager.currentIndex === -1) mediaManager.playTrack(0);
                else if(mediaManager.audio.paused) mediaManager.audio.play();
                else mediaManager.audio.pause();
            },
            next: () => {
                let nextIdx = mediaManager.currentIndex + 1;
                if(nextIdx >= mediaManager.playlist.length) nextIdx = 0;
                mediaManager.playTrack(nextIdx);
            },
            prev: () => {
                let prevIdx = mediaManager.currentIndex - 1;
                if(prevIdx < 0) prevIdx = mediaManager.playlist.length - 1;

            formatTime: (sec) => {
                if (isNaN(sec)) return "0:00";
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            },
            updateProgress: () => {
                const t = mediaManager.audio.currentTime;
                const d = mediaManager.audio.duration;
                if (d) {
                    const prog = document.getElementById('media-progress');
                    prog.value = (t / d) * 100;
                    document.getElementById('media-time').innerText = mediaManager.formatTime(t);
                    document.getElementById('media-duration').innerText = mediaManager.formatTime(d);

                    const appProg = document.getElementById('app-media-progress');
                    if (appProg && !appProg.matches(':active')) {

            myName: localStorage.getItem('nexus_msg_name_v2') || '',
            init: () => {
                localStorage.setItem('nexus_msg_client_id', chatManager.myClientId);
                let rooms = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');
                if (rooms.length === 0) {
                    rooms.push({ id: 'global', name: 'Global Public Chat', topic: 'nexus_os_global_chat_v420', type: 'public' });
                    localStorage.setItem('nexus_msg_rooms', JSON.stringify(rooms));
                }
                chatManager.reconnect();
            },
            updateName: (name) => {
                chatManager.myName = name;
                localStorage.setItem('nexus_msg_name_v2', name);
            },
            reconnect: () => {
                if (chatManager.conn) chatManager.conn.close();
                const rooms = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');
                
                let topics = rooms.map(r => r.topic);
                
                // Always subscribe to personal inbox for DM invites
                if (chatManager.myName) {
                    const myInbox = 'nexus_inbox_' + chatManager.myName.toLowerCase().replace(/[^a-z0-9]/g, '');
                    if (!topics.includes(myInbox)) topics.push(myInbox);
                }

                if (topics.length === 0) return;
                const topicsStr = topics.join(',');
                
                // Use EventSource (HTTPS) instead of WebSocket (WSS) to bypass strict Canvas CSP/sandbox restrictions
                chatManager.conn = new EventSource(`https://ntfy.sh/${topicsStr}/sse`);
                
                chatManager.conn.onopen = () => {
                    if (window.nexusChatStatusCallback) window.nexusChatStatusCallback(true);
                };

                chatManager.conn.onerror = () => {
                    if (window.nexusChatStatusCallback) window.nexusChatStatusCallback(false);
                };

                chatManager.conn.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.event === 'message') {
                        try {
                            const payload = JSON.parse(data.message);
                            
                            // Check if this is a hidden DM invite on our personal inbox
                            if (payload.type === 'dm_invite') {
                                const myInbox = 'nexus_inbox_' + chatManager.myName.toLowerCase().replace(/[^a-z0-9]/g, '');
                                if (data.topic === myInbox) {
                                    let currentRooms = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');
                                    // If we don't have this room yet, add it automatically
                                    if (!currentRooms.find(r => r.topic === payload.room.topic)) {
                                        currentRooms.push(payload.room);
                                        localStorage.setItem('nexus_msg_rooms', JSON.stringify(currentRooms));
                                        
                                        window.notify("New Direct Message", `${payload.sender} started a chat with you!`, 6000);
                                        try { 
                                            const sfx = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3');
                                            sfx.volume = 0.6; sfx.play(); 
                                        } catch(err) {}
                                        
                                        chatManager.reconnect(); // Re-establish sockets to include new room
                                        if (window.nexusChatForceRenderRooms) window.nexusChatForceRenderRooms(); // Refresh UI if open
                                    }
                                }
                                return; // Stop processing as normal message
                            }

                            // Normal message processing
                            const roomsList = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');
                            const targetRoom = roomsList.find(r => r.topic === data.topic);
                            
                            if (targetRoom) {
                                let history = JSON.parse(localStorage.getItem('nexus_msg_history_v3') || '{}');
                                if (!history[targetRoom.id]) history[targetRoom.id] = [];
                                
                                const isDuplicate = history[targetRoom.id].some(m => m.timestamp === payload.timestamp && m.sender === payload.sender && m.text === payload.text);
                                const isMe = payload.sender === chatManager.myName && payload.clientId === chatManager.myClientId;
                                
                                if (!isDuplicate) {
                                    history[targetRoom.id].push(payload);
                                    localStorage.setItem('nexus_msg_history_v3', JSON.stringify(history));
                                    
                                    if (window.nexusChatAppCallback) {
                                        window.nexusChatAppCallback(payload, targetRoom);
                                    } else if (!isMe) {
                                        // App is closed or hidden, notify globally via OS
                                        let cleanText = payload.text;
                                        if (cleanText.startsWith('[IMAGE:')) cleanText = '🖼️ Sent an image';
                                        
                                        window.notify(`New message in ${targetRoom.name}`, `<b>${payload.sender}:</b> ${cleanText}`, 6000);
                                        try { 
                                            const sfx = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3');
                                            sfx.volume = 0.6;
                                            sfx.play(); 
                                        } catch(e) {}
                                    }
                                }
                            }
                        } catch(err) {}
                    }
                };
            },
            send: (topic, payload) => {
                fetch(`https://ntfy.sh/${topic}`, {

                                        <button id="msg-invite-btn" class="p-2 rounded-full hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 transition-colors hidden" title="Invite Friends"><i data-lucide="user-plus" class="w-5 h-5"></i></button>
                                        <button id="msg-delete-room-btn" class="p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 transition-colors hidden"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                    </div>
                                </div>
                                
                                <div id="msg-messages-container" class="flex-1 overflow-y-auto custom-scrollbar p-4 flex flex-col gap-1.5 relative">
                                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none" id="msg-empty-state">
                                        <div class="text-center text-gray-400 flex flex-col items-center">
                                            <div class="w-24 h-24 bg-[#f0f4f9] dark:bg-[#1e1f20] rounded-full flex items-center justify-center mb-4">
                                                <i data-lucide="message-square" class="w-10 h-10 opacity-40"></i>
                                            </div>
                                            <span class="font-medium text-gray-600 dark:text-gray-300">Your messages</span>
                                            <span class="text-xs mt-1 max-w-xs">Select a conversation or start a new private chat.</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Emoji Picker Popup -->
                                <div id="msg-emoji-picker" class="absolute bottom-[4.5rem] right-4 bg-white dark:bg-[#1e1e1f] border border-gray-200 dark:border-gray-700 rounded-2xl shadow-2xl p-3 w-64 hidden grid grid-cols-5 gap-1 z-20 transition-all">
                                    <!-- Populated by JS -->
                                </div>
                                
                                <div class="p-3 shrink-0 bg-white dark:bg-[#0e0e0f] border-t border-transparent relative z-10">
                                    <div class="flex items-center gap-1 bg-[#f0f4f9] dark:bg-[#1e1f20] rounded-[2rem] pl-2 pr-1.5 py-1.5 focus-within:bg-[#e9eef6] dark:focus-within:bg-[#282a2c] transition-colors">
                                        <button id="msg-attach-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Attach File"><i data-lucide="plus-circle" class="w-6 h-6"></i></button>
                                        <button id="msg-image-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Send Image URL"><i data-lucide="image" class="w-5 h-5"></i></button>
                                        <input type="text" id="msg-input" class="flex-1 bg-transparent border-none outline-none text-[15px] placeholder-gray-500 dark:placeholder-gray-400 py-2 px-2 min-w-0" placeholder="Text message" disabled autocomplete="off">
                                        <button id="msg-emoji-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="Emojis"><i data-lucide="smile" class="w-5 h-5"></i></button>
                                        <button id="msg-send-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-[#0b57d0] dark:text-[#a8c7fa] bg-transparent hover:bg-blue-100 dark:hover:bg-blue-900/30 opacity-50 cursor-not-allowed transition-all" disabled>
                                            <i data-lucide="send" class="w-5 h-5 ml-0.5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- New Chat Modal -->
                            <div id="msg-new-modal" class="absolute inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
                                <div class="bg-white dark:bg-[#1e1e1f] w-full max-w-md rounded-[1.5rem] shadow-2xl p-6 transform scale-95 transition-all" id="msg-new-modal-content">
                                    <h2 class="text-xl font-normal mb-1 text-gray-900 dark:text-white">New Conversation</h2>
                                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Add a friend via username, or join a private room code.</p>

                                    <div class="mb-5">
                                        <h3 class="text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-blue-500"></i> Direct Message</h3>
                                        <div class="flex gap-2">
                                            <input type="text" id="msg-dm-username" placeholder="Exact username of friend" class="flex-1 bg-[#f0f4f9] dark:bg-[#131314] rounded-lg px-4 py-2 border-none outline-none text-gray-900 dark:text-gray-100 placeholder-gray-500">
                                            <button id="msg-dm-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors shadow-sm">Chat</button>
                                        </div>
                                    </div>

                                    <div class="relative flex py-3 items-center">
                                        <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                                        <span class="flex-shrink-0 mx-4 text-gray-400 text-xs font-bold uppercase tracking-wider">OR</span>
                                        <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                                    </div>

                                    <div class="mt-2 mb-6">
                                        <h3 class="text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4 text-purple-500"></i> Custom Room</h3>
                                        <div class="flex gap-2">
                                            <input type="text" id="msg-room-code" placeholder="Secret room code" class="flex-1 bg-[#f0f4f9] dark:bg-[#131314] rounded-lg px-4 py-2 border-none outline-none text-gray-900 dark:text-gray-100 placeholder-gray-500">
                                            <button id="msg-room-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg font-medium transition-colors shadow-sm">Join</button>
                                        </div>
                                    </div>

                                    <div class="flex justify-end gap-2 mt-2 pt-4 border-t border-gray-100 dark:border-gray-800">
                                        <button id="msg-new-cancel" class="px-5 py-2.5 rounded-full text-[#0b57d0] dark:text-[#a8c7fa] hover:bg-[#f0f4f9] dark:hover:bg-[#131314] font-medium transition-colors w-full">Cancel</button>
                            </div>
                        </div>
                    </div>
                `,
                init: (id, root) => {
                    const setupView = root.querySelector('#msg-setup');
                    const mainView = root.querySelector('#msg-main');
                    const sidebar = root.querySelector('#msg-sidebar');
                    const chatArea = root.querySelector('#msg-chat-area');
                    const msgContainer = root.querySelector('#msg-messages-container');
                    const input = root.querySelector('#msg-input');
                    const sendBtn = root.querySelector('#msg-send-btn');
                    const newModal = root.querySelector('#msg-new-modal');
                    const emptyState = root.querySelector('#msg-empty-state');
                    const inviteModal = root.querySelector('#msg-invite-modal');
                    const inviteCodeDisplay = root.querySelector('#msg-invite-code-display');
                    const inviteCopyBtn = root.querySelector('#msg-invite-copy-btn');
                    const inviteBtn = root.querySelector('#msg-invite-btn');
                    
                    const settingsBtn = root.querySelector('#msg-settings-btn');
                    const settingsMenu = root.querySelector('#msg-settings-menu');
                    const settingsUsername = root.querySelector('#msg-settings-username');
                    const settingsAvatar = root.querySelector('#msg-settings-avatar');

                    let myName = chatManager.myName;
                    const myClientId = chatManager.myClientId;
                    let activeRoomId = null;
                    let isMobileView = false;
                    
                    settingsBtn.onclick = (e) => {
                        e.stopPropagation();
                        settingsUsername.innerText = chatManager.myName;
                        settingsAvatar.innerText = chatManager.myName ? chatManager.myName.charAt(0).toUpperCase() : '?';
                        settingsMenu.classList.toggle('hidden');
                    };

                    settingsMenu.onclick = (e) => e.stopPropagation();

                    root.addEventListener('click', () => {
                        if (!settingsMenu.classList.contains('hidden')) {
                            settingsMenu.classList.add('hidden');
                        }
                    });
                    
                    // State Management
                    let rooms = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');
                    let chatHistory = JSON.parse(localStorage.getItem('nexus_msg_history_v3') || '{}');
                    
                    // Emojis & Attachments Setup
                    const emojiPicker = root.querySelector('#msg-emoji-picker');
                    const emojisList = ['😀','😂','🥰','😎','😭','😊','🥺','😍','🙏','👍','🔥','❤️','✨','🎉','💯','👀','💀','🤔','🤡','👽'];
                    emojisList.forEach(e => {
                        const btn = document.createElement('button');
                        btn.className = 'p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg text-2xl flex items-center justify-center transition-colors cursor-pointer active:scale-90';
                        btn.innerText = e;
                        btn.onclick = (ev) => { 
                            ev.stopPropagation(); 
                            input.value += e; 
                            input.focus(); 
                            emojiPicker.classList.add('hidden'); 
                            checkInput(); 
                        };
                        emojiPicker.appendChild(btn);
                    });

                    root.querySelector('#msg-emoji-btn').onclick = (e) => { e.stopPropagation(); emojiPicker.classList.toggle('hidden'); };
                    msgContainer.onclick = () => emojiPicker.classList.add('hidden');

                    root.querySelector('#msg-attach-btn').onclick = () => {
                        window.notify('Attachments', 'File uploads require Nexus Cloud Storage. Try sending an Image URL using the photo button instead!', 4000);
                    };

                    root.querySelector('#msg-image-btn').onclick = () => {
                        const url = prompt("Enter an Image URL to send (e.g. https://placehold.co/400x300):");
                        if(url && url.startsWith('http')) {
                            const payload = { sender: myName, text: `[IMAGE:${url}]`, clientId: myClientId, roomId: activeRoomId, timestamp: Date.now() };
                            processOutgoing(payload);
                        }
                    };

                    const checkInput = () => {
                        if(input.value.trim().length > 0 && activeRoomId) {
                            sendBtn.disabled = false;
                            sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                            sendBtn.classList.add('hover:bg-blue-200', 'dark:hover:bg-blue-900/50');
                        } else {
                            sendBtn.disabled = true;
                            sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                            sendBtn.classList.remove('hover:bg-blue-200', 'dark:hover:bg-blue-900/50');
                        }
                    };
                    input.oninput = checkInput;

                    // Ensure rooms are synced in case background service added them
                    rooms = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');

                    function saveRooms() { localStorage.setItem('nexus_msg_rooms', JSON.stringify(rooms)); }
                    function saveHistory() { localStorage.setItem('nexus_msg_history_v3', JSON.stringify(chatHistory)); }

                    // OS Background Service Callbacks
                    window.nexusChatStatusCallback = (isConnected) => {
                        const status = root.querySelector('#msg-active-status');
                        if (status) {
                            if (isConnected) status.classList.remove('hidden');
                            else status.classList.add('hidden');
                        }
                    };

                    window.nexusChatAppCallback = (payload, targetRoom) => {
                        chatHistory = JSON.parse(localStorage.getItem('nexus_msg_history_v3') || '{}'); // Refetch
                        
                        const myWin = document.getElementById(id);
                        const isFocused = myWin && myWin.classList.contains('active-window') && !myWin.classList.contains('minimized') && !myWin.classList.contains('hidden-workspace');
                        const isMe = payload.sender === myName && payload.clientId === myClientId;

                        if (activeRoomId === targetRoom.id) {
                            appendMessage(payload);
                        }
                        
                        // Notify via OS if we aren't fully focused or we are looking at a different room
                        if (!isMe && (!isFocused || activeRoomId !== targetRoom.id)) {
                            let cleanText = payload.text;
                            if (cleanText.startsWith('[IMAGE:')) cleanText = '🖼️ Sent an image';
                            window.notify(`New message in ${targetRoom.name}`, `<b>${payload.sender}:</b> ${cleanText}`, 5000);
                            try { new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3').play(); } catch(e) {}
                        }
                        
                        renderRooms(); // Update sidebar preview text
                    };

                    // Called by the background chat manager if a DM invite arrives while app is open
                    window.nexusChatForceRenderRooms = () => {
                        rooms = JSON.parse(localStorage.getItem('nexus_msg_rooms') || '[]');
                        renderRooms();
                    };

                    windows[id].unsub = () => { 
                        window.nexusChatAppCallback = null; 
                        window.nexusChatStatusCallback = null; 
                        window.nexusChatForceRenderRooms = null;
                    };

                    // Responsiveness Helper
                    const checkMobile = () => {
                        isMobileView = root.clientWidth < 640;
                        if(isMobileView && activeRoomId) {
                            sidebar.classList.add('hidden');
                            chatArea.classList.remove('hidden');
                        } else if(isMobileView && !activeRoomId) {
                            sidebar.classList.remove('hidden');
                            chatArea.classList.add('hidden');
                        } else {
                            sidebar.classList.remove('hidden');
                            chatArea.classList.remove('hidden');
                        }
                    };
                    new ResizeObserver(checkMobile).observe(root);

                    if (chatManager.myName) {
                        myName = chatManager.myName;
                        root.querySelector('#msg-name-input').value = myName;
                        setupView.classList.add('hidden');
                        mainView.classList.remove('hidden');
                        root.querySelector('#msg-my-avatar').innerText = myName.charAt(0).toUpperCase();
                        renderRooms();
                    } else {
                        setupView.classList.remove('hidden');
                    }

                    root.querySelector('#msg-setup-btn').onclick = () => {
                        const name = root.querySelector('#msg-name-input').value.trim();
                        if (name) {
                            myName = name;
                            chatManager.updateName(name);
                            setupView.classList.add('hidden');
                            mainView.classList.remove('hidden');
                            root.querySelector('#msg-my-avatar').innerText = myName.charAt(0).toUpperCase();
                            chatManager.init(); // re-init since we have a name now
                            renderRooms();
                        }
                    };

                    function renderRooms() {
                        const list = root.querySelector('#msg-room-list');
                        list.innerHTML = '';
                        
                        rooms.forEach(r => {
                            const hist = chatHistory[r.id] || [];
                            
                            // Get preview text (hide image tags)
                            let lastMsg = 'Start chatting';
                            if (hist.length > 0) {
                                lastMsg = hist[hist.length - 1].text;
                                if (lastMsg.startsWith('[IMAGE:')) lastMsg = '🖼️ Sent an image';
                            }
                            
                            const isActive = activeRoomId === r.id;
                            
                            const el = document.createElement('div');
                            el.className = `flex items-center gap-4 px-3 py-3 rounded-2xl cursor-pointer transition-colors mb-0.5 ${isActive ? 'bg-[#c2e7ff] dark:bg-[#004a77]' : 'hover:bg-[#f0f4f9] dark:hover:bg-[#1e1f20]'}`;
                            
                            const iconHtml = r.type === 'public' 
                                ? `<i data-lucide="globe-2" class="w-5 h-5 text-white"></i>`
                                : (r.type === 'dm' ? r.name.charAt(0).toUpperCase() : `<i data-lucide="hash" class="w-5 h-5 text-white"></i>`);
                                
                            const avatarColor = r.type === 'public' 
                                ? 'from-blue-500 to-indigo-500' 
                                : (r.type === 'dm' ? 'from-rose-400 to-orange-500' : 'from-emerald-400 to-teal-600');

                            el.innerHTML = `
                                <div class="w-12 h-12 rounded-full bg-gradient-to-tr ${avatarColor} flex items-center justify-center font-bold text-white text-xl shrink-0 shadow-sm">
                                    ${iconHtml}
                                </div>
                                <div class="flex-1 overflow-hidden flex flex-col justify-center">
                                    <div class="font-medium text-[15px] ${isActive ? 'text-[#001d35] dark:text-[#c2e7ff]' : 'text-gray-900 dark:text-gray-100'} truncate leading-tight">${r.name}</div>
                                    <div class="text-[13px] ${isActive ? 'text-[#004a77] dark:text-[#a8c7fa]' : 'text-gray-500 dark:text-gray-400'} truncate leading-tight mt-0.5">${lastMsg}</div>
                                </div>
                            `;
                            el.onclick = () => openRoom(r.id);
                            list.appendChild(el);
                        });
                        lucide.createIcons({root: list});
                    }

                    function openRoom(roomId) {
                        activeRoomId = roomId;
                        const room = rooms.find(r => r.id === roomId);
                        if (!room) return;

                        if(isMobileView) {
                            sidebar.classList.add('hidden');
                            chatArea.classList.remove('hidden');
                        }

                        root.querySelector('#msg-active-name').innerText = room.name;
                        const avatar = root.querySelector('#msg-active-avatar');
                        
                        if (room.type === 'public') {
                            avatar.innerHTML = '<i data-lucide="globe-2" class="w-5 h-5"></i>';
                            avatar.className = "w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 text-white flex items-center justify-center font-bold shadow-sm";
                            root.querySelector('#msg-delete-room-btn').classList.add('hidden');
                            inviteBtn.classList.add('hidden');
                        } else if (room.type === 'dm') {
                            avatar.innerHTML = room.name.charAt(0).toUpperCase();
                            avatar.className = "w-10 h-10 rounded-full bg-gradient-to-tr from-rose-400 to-orange-500 text-white flex items-center justify-center font-bold shadow-sm text-lg";
                            root.querySelector('#msg-delete-room-btn').classList.remove('hidden');
                            inviteBtn.classList.add('hidden');
                        } else {
                            avatar.innerHTML = '<i data-lucide="hash" class="w-5 h-5"></i>';
                            avatar.className = "w-10 h-10 rounded-full bg-gradient-to-tr from-emerald-400 to-teal-600 text-white flex items-center justify-center font-bold shadow-sm";
                            root.querySelector('#msg-delete-room-btn').classList.remove('hidden');
                            inviteBtn.classList.remove('hidden');
                        }
                        
                        lucide.createIcons({root: avatar});

                        input.disabled = false;
                        checkInput();
                        emptyState.classList.add('hidden');
                        
                        renderRooms(); 
                        
                        // Render messages
                        msgContainer.innerHTML = '';
                        const msgs = chatHistory[roomId] || [];
                        let lastSender = null;
                        
                        msgs.forEach(m => {
                            renderMessageBubble(m, lastSender);
                            lastSender = m.sender;
                        });
                        msgContainer.scrollTop = msgContainer.scrollHeight;
                        
                        // Update status if currently connected via global OS
                        if (chatManager.conn && chatManager.conn.readyState === 1) {
                            root.querySelector('#msg-active-status').classList.remove('hidden');
                        }
                    }

                    function renderMessageBubble(payload, lastSender) {
                        const isMe = payload.sender === myName && payload.clientId === myClientId; 
                        const isContinuation = payload.sender === lastSender;
                        
                        // Handle formatting (escaping HTML & rendering images)
                        let safeText = payload.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const imgMatch = payload.text.match(/^\\[IMAGE:(.+)\\]$/);
                        
                        if (imgMatch) {
                            const safeUrl = imgMatch[1].replace(/"/g, "&quot;");
                            safeText = `<img src="${safeUrl}" class="max-w-full h-auto max-h-48 rounded-lg border border-gray-200 dark:border-gray-700 mt-1 cursor-pointer hover:opacity-90 transition-opacity bg-white" onclick="window.open('${safeUrl}', '_blank')" onerror="this.outerHTML='<span class=\\'text-red-500 text-xs italic\\'>[Broken Image URL]</span>'">`;
                        }

                        const div = document.createElement('div');
                        
                        if (isMe) {
                            div.className = `max-w-[80%] self-end flex flex-col items-end ${isContinuation ? 'mt-0' : 'mt-2'}`;
                            div.innerHTML = `
                                <div class="px-4 py-2 text-[15px] bg-[#c2e7ff] dark:bg-[#004a77] text-[#001d35] dark:text-[#e3f2fd] rounded-3xl ${isContinuation ? 'rounded-tr-md' : 'rounded-tr-3xl rounded-br-md'} shadow-sm break-words">${safeText}</div>
                            `;
                        } else {
                            div.className = `max-w-[80%] self-start flex flex-col items-start ${isContinuation ? 'mt-0' : 'mt-2'}`;
                            div.innerHTML = `
                                ${!isContinuation ? `<div class="text-[11px] text-gray-500 dark:text-gray-400 mb-0.5 ml-3 font-medium">${payload.sender}</div>` : ''}
                                <div class="px-4 py-2 text-[15px] bg-[#f0f4f9] dark:bg-[#1e1f20] text-gray-900 dark:text-gray-100 rounded-3xl ${isContinuation ? 'rounded-tl-md' : 'rounded-tl-3xl rounded-bl-md'} shadow-sm break-words border border-transparent">${safeText}</div>
                            `;
                        }
                        
                        msgContainer.appendChild(div);
                    }

                    function appendMessage(payload) {
                        const hist = chatHistory[activeRoomId] || [];
                        const lastSender = hist.length > 1 ? hist[hist.length - 2].sender : null;
                        renderMessageBubble(payload, lastSender);
                        msgContainer.scrollTop = msgContainer.scrollHeight;
                    }

                    const processOutgoing = (payload) => {
                        if (!chatHistory[activeRoomId]) chatHistory[activeRoomId] = [];
                        chatHistory[activeRoomId].push(payload);
                        saveHistory();
                        appendMessage(payload);
                        renderRooms();

                        const room = rooms.find(r => r.id === activeRoomId);
                        if (room) {
                            chatManager.send(room.topic, payload);
                        }
                    };

                    function sendMessage() {
                        const text = input.value.trim();
                        if (!text || !activeRoomId) return;
                        
                        input.value = '';
                        checkInput();
                        emojiPicker.classList.add('hidden');
                        
                        const payload = { sender: myName, text: text, clientId: myClientId, roomId: activeRoomId, timestamp: Date.now() };
                        processOutgoing(payload);
                    }

                    sendBtn.onclick = sendMessage;
                    input.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

                    // Modals and Nav
                    inviteBtn.onclick = () => {
                        const room = rooms.find(r => r.id === activeRoomId);
                        if(!room || room.type !== 'private') return;
                        
                        inviteCodeDisplay.value = room.topic.replace('nexus_priv_', '');
                        inviteModal.classList.remove('hidden');
                        requestAnimationFrame(() => {
                            root.querySelector('#msg-invite-modal-content').classList.remove('scale-95');
                            root.querySelector('#msg-invite-modal-content').classList.add('scale-100');
                        });
                    };

                    root.querySelector('#msg-invite-close').onclick = () => {
                        root.querySelector('#msg-invite-modal-content').classList.add('scale-95');
                        root.querySelector('#msg-invite-modal-content').classList.remove('scale-100');
                        setTimeout(() => inviteModal.classList.add('hidden'), 200);
                    };

                    inviteCopyBtn.onclick = () => {
                        inviteCodeDisplay.select();
                        document.execCommand('copy');
                        inviteCopyBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i>';
                        lucide.createIcons({root: inviteCopyBtn});
                        setTimeout(() => {
                            inviteCopyBtn.innerHTML = '<i data-lucide="copy" class="w-5 h-5"></i>';
                            lucide.createIcons({root: inviteCopyBtn});
                        }, 2000);
                        window.notify("Copied", "Invite code copied to clipboard!");
                    };

                    root.querySelector('#msg-fab').onclick = () => {
                        newModal.classList.remove('hidden');
                        root.querySelector('#msg-dm-username').focus();
                    };
                    
                    root.querySelector('#msg-new-cancel').onclick = () => {
                        newModal.classList.add('hidden');
                        root.querySelector('#msg-dm-username').value = '';
                        root.querySelector('#msg-room-code').value = '';
                    };

                    // DM creation logic
                    root.querySelector('#msg-dm-btn').onclick = () => {
                        const friend = root.querySelector('#msg-dm-username').value.trim();
                        if(!friend) { alert("Enter a username to chat with!"); return; }
                        if(friend.toLowerCase() === myName.toLowerCase()) { alert("You can't DM yourself!"); return; }

                        // Sort names alphabetically to ensure both users compute the exact same topic string!
                        const sorted = [myName.toLowerCase(), friend.toLowerCase()].sort();
                        const topic = 'nexus_dm_' + sorted[0].replace(/[^a-z0-9]/g, '') + '_' + sorted[1].replace(/[^a-z0-9]/g, '');

                        if (!rooms.find(r => r.topic === topic)) {
                            const newRoomId = 'rm_' + Date.now();
                            rooms.push({ id: newRoomId, name: friend, topic: topic, type: 'dm' });
                            saveRooms();
                            chatManager.reconnect(); // Resubscribe globally
                            renderRooms();
                            openRoom(newRoomId);

                            // Send an invisible invite directly to the friend's personal inbox!

                        { id: 'passgen', name: 'Password Gen', author: 'NexusOS', desc: 'Secure random password generator.', icon: 'key', content: '<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="bg-gray-900 text-white p-8 h-screen font-sans flex flex-col items-center justify-center"><h1 class="text-2xl font-bold mb-6">Password Generator</h1><div class="bg-gray-800 p-6 rounded-xl shadow-lg w-full max-w-md"><div class="flex items-center gap-2 mb-4"><input type="text" id="pwd" class="flex-1 bg-gray-900 border border-gray-700 p-3 rounded text-lg font-mono text-green-400" readonly><button onclick="copy()" class="bg-blue-600 hover:bg-blue-500 p-3 rounded transition"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></div><div class="mb-4"><label class="flex justify-between text-sm text-gray-400 mb-1"><span>Length</span><span id="len-val">16</span></label><input type="range" id="len" min="8" max="64" value="16" class="w-full accent-blue-500" oninput="document.getElementById(\'len-val\').innerText=this.value; gen()"></div><button onclick="gen()" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded font-bold transition">Generate New</button></div><script>function gen(){const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";let p="";const l=document.getElementById(\'len\').value;for(let i=0;i<l;i++) p+=chars.charAt(Math.floor(Math.random()*chars.length));document.getElementById(\'pwd\').value=p;}function copy(){ navigator.clipboard.writeText(document.getElementById(\'pwd\').value); alert("Copied!"); } gen();<\/script></body></html>' },
                        { id: 'devinfo', name: 'Device Info', author: 'NexusOS', desc: 'Detailed browser and system telemetry.', icon: 'cpu', content: '<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="bg-gray-100 p-8 h-screen font-sans"><h1 class="text-2xl font-bold mb-6 text-gray-800">Device Info</h1><div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden"><table class="w-full text-left text-sm"><tbody id="info-table" class="divide-y divide-gray-200"></tbody></table></div><script>const d={"User Agent":navigator.userAgent,"Platform":navigator.platform,"Language":navigator.language,"Screen Resolution":\`\${window.screen.width} x \${window.screen.height}\`,"Window Size":\`\${window.innerWidth} x \${window.innerHeight}\`,"Color Depth":\`\${window.screen.colorDepth}-bit\`,"Logical Processors":navigator.hardwareConcurrency||"Unknown","Device Memory":navigator.deviceMemory?navigator.deviceMemory+" GB":"Unknown","Online":navigator.onLine?"Yes":"No","Cookies Enabled":navigator.cookieEnabled?"Yes":"No"};const t=document.getElementById("info-table");for(let k in d)t.innerHTML+=\`<tr class="hover:bg-gray-50"><td class="px-4 py-3 font-semibold text-gray-700 w-1/3">\${k}</td><td class="px-4 py-3 text-gray-600 break-all">\${d[k]}</td></tr>\`;<\/script></body></html>' },
                        { id: 'jsonfmt', name: 'JSON Formatter', author: 'NexusOS', desc: 'Format and validate JSON data.', icon: 'code', content: '<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body class="bg-gray-900 p-6 h-screen font-sans flex flex-col gap-4"><h1 class="text-xl font-bold text-white flex justify-between items-center">JSON Formatter <button onclick="fmt()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm transition">Format</button></h1><textarea id="inp" class="flex-1 w-full bg-gray-800 text-green-400 p-4 rounded-lg outline-none font-mono text-sm border border-gray-700 focus:border-blue-500 resize-none" placeholder="Paste raw JSON here..."></textarea><script>function fmt(){const el=document.getElementById(\'inp\');try{const obj=JSON.parse(el.value);el.value=JSON.stringify(obj,null,4);el.classList.remove(\'border-red-500\');}catch(e){el.classList.add(\'border-red-500\');alert("Invalid JSON: "+e.message);}}<\/script></body></html>' }

            runner: {

                init: (id, root, arg) => { 
                    const iframe = root.querySelector('.runner-frame'); 
                    const title = root.querySelector('.runner-title'); 
                    title.innerText = "Loading..."; 
                    
                    iframe.src = "about:blank";
                    iframe.removeAttribute("srcdoc");

                    const loadWithStorageAccess = (htmlContent) => {
                        const blob = new Blob([htmlContent], { type: 'text/html' });
                        iframe.src = URL.createObjectURL(blob);
                    };

                    if (arg && typeof arg === 'object') { 
                        title.innerText = arg.name || "Preview"; 
                        if (arg.url) { 
                            iframe.src = arg.url; 
                        } else if (arg.content) { 
                            loadWithStorageAccess(arg.content); 
                        } 
                    } else if (typeof arg === 'string') { 
                        title.innerText = arg; 
                        const f = fs.getPath(arg); 
                        if(f && f.type === 'file') { 
                            loadWithStorageAccess(f.content); 
                        } else { 
                            iframe.srcdoc = "File not found."; 
                        } 
                    } else { 
                        iframe.srcdoc = "<div style='padding:20px;font-family:sans-serif;color:#555;'>No App Selected</div>"; 
                        title.innerText = "No App"; 
                    } 
                } 
            },

            terminal: { title: 'Terminal', icon: 'terminal-square', color: 'text-gray-300', render: () => `<div class="h-full bg-[#1e1e1e] text-gray-300 p-2 terminal-font text-sm overflow-y-auto" onclick="this.querySelector('input').focus()"><div class="term-out"></div><div class="flex"><span class="text-green-400" id="term-user-prompt">user@nexus</span>:<span class="text-blue-400">~</span>$&nbsp;<input class="bg-transparent border-none outline-none flex-1 text-gray-200" autofocus></div></div>`, init: (id, root) => { const out = root.querySelector('.term-out'); const inp = root.querySelector('input'); const promptUser = root.querySelector('#term-user-prompt'); if(userData) promptUser.innerText = `${userData.username}@nexus`; const print = (t) => { const d=document.createElement('div'); d.innerHTML=t; out.appendChild(d); }; print("Nexus OS v4.20 Terminal"); print("Type 'help' for a list of commands."); inp.onkeydown = (e) => { if(e.key === 'Enter') { const val = inp.value.trim(); if(val) print(`<span class="text-green-400">${userData ? userData.username : 'user'}@nexus</span>:<span class="text-blue-400">~</span>$ ${val}`); const parts = val.split(' '); const cmd = parts[0].toLowerCase(); const args = parts.slice(1); if(cmd === 'clear') { out.innerHTML = ''; } else if(cmd === 'help') { print("Available commands:"); print("&nbsp;&nbsp;help&nbsp;&nbsp;&nbsp;&nbsp;- Show this message"); print("&nbsp;&nbsp;clear&nbsp;&nbsp;&nbsp;- Clear terminal output"); print("&nbsp;&nbsp;ls&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- List desktop items"); print("&nbsp;&nbsp;whoami&nbsp;&nbsp;- Show current user"); print("&nbsp;&nbsp;date&nbsp;&nbsp;&nbsp;&nbsp;- Show current date/time"); print("&nbsp;&nbsp;open&nbsp;&nbsp;&nbsp;&nbsp;- Open an app (e.g., 'open paint', 'open browser')"); print("&nbsp;&nbsp;theme&nbsp;&nbsp;&nbsp;- Switch theme (e.g., 'theme light', 'theme dark')"); print("&nbsp;&nbsp;reboot&nbsp;&nbsp;- Restart OS"); } else if(cmd === 'ls') { const desk = fs.getPath('/home/user/Desktop'); if(desk && desk.children) { print(Object.keys(desk.children).join('&nbsp;&nbsp;&nbsp;&nbsp;') || "Empty"); } else { print("Desktop"); } } else if(cmd === 'whoami') { print(userData ? userData.username : "guest"); } else if(cmd === 'date') { print(new Date().toString()); } else if(cmd === 'open') { if(args[0]) { if(appDefinitions[args[0]]) { window.openApp(args[0]); print(`Opening ${args[0]}...`); } else { print(`App '${args[0]}' not found.`); } } else { print("Usage: open &lt;appId&gt;"); } } else if(cmd === 'theme') { if(args[0] === 'dark' || args[0] === 'light') { applyTheme(args[0]); print(`Theme set to ${args[0]}.`); } else { print("Usage: theme &lt;dark|light&gt;"); } } else if(cmd === 'reboot') { print("Rebooting..."); setTimeout(()=>location.reload(), 500); } else if(val) { print(`Command not found: ${cmd}`); } inp.value=''; root.firstElementChild.scrollTop=root.firstElementChild.scrollHeight; } }; } },

                                <div class="text-gray-400 font-mono text-sm bg-gray-800 px-3 py-1 rounded-full border border-gray-700 mb-8 shadow-inner">Version <span id="settings-version-display">4.20</span> (Stable)</div>

                init: (id, root) => {
                    // Tab switching logic
                    const tabs = root.querySelectorAll('.set-tab');
                    const panes = root.querySelectorAll('.set-pane');
                    tabs.forEach(tab => {
                        tab.onclick = () => {
                            tabs.forEach(t => {
                                t.classList.remove('bg-blue-600/20', 'text-blue-400', 'border-blue-500');
                                t.classList.add('text-gray-400', 'border-transparent');
                            });
                            tab.classList.add('bg-blue-600/20', 'text-blue-400', 'border-blue-500');
                            tab.classList.remove('text-gray-400', 'border-transparent');
                            
                            panes.forEach(p => p.classList.add('hidden'));
                            root.querySelector('#set-' + tab.dataset.target).classList.remove('hidden');

                            if (tab.dataset.target === 'system') {
                                // Calculate approximate storage used by LocalStorage
                                let total = 0;
                                for(let x in localStorage) { if(localStorage.hasOwnProperty(x)) total += ((localStorage[x].length + x.length) * 2); }
                                const kb = (total / 1024).toFixed(2);
                                const mb = (kb / 1024).toFixed(2);
                                root.querySelector('#storage-info').innerText = mb > 1 ? mb + ' MB used' : kb + ' KB used';
                            }
                        };
                    });

                    root.querySelectorAll('.preset-wp').forEach(img => {
                        img.onclick = () => window.setWallpaper(img.src);
                    });

                    // Custom Wallpaper Upload via File Reader
